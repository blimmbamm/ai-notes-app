services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  smtp4dev:
    image: rnwood/smtp4dev:v3
    ports:
      - "5000:80"
      - "1025:25"

volumes:
  postgres_data:
