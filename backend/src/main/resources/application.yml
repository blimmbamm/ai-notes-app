server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notesdb}
    username: ${SPRING_DATASOURCE_USERNAME:notes}
    password: ${SPRING_DATASOURCE_PASSWORD:notes}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - email
              - profile

management:
  endpoints:
    web:
      exposure:
        include: "health"

app:
  frontend-url: ${FRONTEND_URL:http://localhost}
  auth:
    cookies:
      access-token-name: ${AUTH_ACCESS_COOKIE:access_token}
      refresh-token-name: ${AUTH_REFRESH_COOKIE:refresh_token}
      same-site: ${AUTH_COOKIE_SAMESITE:Lax}
      secure: ${AUTH_COOKIE_SECURE:false}
      domain: ${AUTH_COOKIE_DOMAIN:}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-long-random-value-change-this-secret}
    access-token-minutes: 5
    refresh-token-days: 14
    reset-token-minutes: 60
