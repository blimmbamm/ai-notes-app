spring:
  datasource:
    url: jdbc:h2:mem:notesdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

management:
  health:
    mail:
      enabled: false

app:
  frontend-url: http://frontend.test
  jwt:
    secret: test-secret-please-change-test-secret-please-change
    access-token-minutes: 15
    refresh-token-days: 14
    reset-token-minutes: 60

logging:
  level: 
    root: off